name: CI/CD pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    
    # force terminal tools to output colors in GitHub Actions
    env:
      FORCE_COLOR: "1"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up dependencies
        run: make setup

      # 1. FOR PULL REQUESTS: Only run the tests
      - name: Run pipeline and test
        if: github.ref != 'refs/heads/main'
        run: make test

      # 2. FOR MAIN BRANCH: Run tests AND publish
      - name: Run pipeline, test, and publish
        if: github.ref == 'refs/heads/main'
        env:
          USER: ${{ secrets.USER }}
          PASSWORD: ${{ secrets.PASSWORD }}
          GRAPH: ${{ secrets.GRAPH }}
          ENDPOINT: ${{ secrets.ENDPOINT }}
        run: make publish
